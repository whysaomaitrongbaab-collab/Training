<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Output Review & Annotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container { max-width: 1600px; margin: 0 auto; }

    header {
      background: #1a4080;
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    header h1 { font-size: 24px; margin-bottom: 8px; }
    header .subtitle { font-size: 14px; opacity: 0.9; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .panel-header {
      background: #f0f0f0;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
      font-weight: 600;
      font-size: 14px;
    }

    .panel-content {
      padding: 20px;
      overflow-y: auto;
      max-height: 600px;
    }

    .image-container {
      text-align: center;
    }

    .image-container img {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .image-nav {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: center;
    }

    button {
      padding: 8px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.success { background: #28a745; }
    button.success:hover { background: #218838; }
    button.danger { background: #dc3545; }
    button.danger:hover { background: #c82333; }

    .json-editor {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
      overflow-x: auto;
    }

    .json-editor textarea {
      width: 100%;
      min-height: 400px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      resize: vertical;
    }

    .record-selector {
      margin-bottom: 20px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .record-selector select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-top: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status-pending { background: #fff3cd; color: #856404; }
    .status-reviewed { background: #d1ecf1; color: #0c5460; }
    .status-approved { background: #d4edda; color: #155724; }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .record-list {
      list-style: none;
    }

    .record-list li {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .record-list li:hover { background: #f9f9f9; }
    .record-list li.active { background: #e3f2fd; }

    .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 4px; }
    .success { color: #155724; background: #d4edda; padding: 10px; border-radius: 4px; }
    .info { color: #004085; background: #d1ecf1; padding: 10px; border-radius: 4px; }

    @media (max-width: 1200px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Structural Plan Review & Annotation</h1>
      <p class="subtitle">Review Qwen extractions, correct errors, and build annotated dataset</p>
    </header>

    <div class="record-selector">
      <label for="recordSelect">Select a record to review:</label>
      <select id="recordSelect">
        <option value="">Loading records...</option>
      </select>
      <div id="recordInfo" style="margin-top: 10px; font-size: 12px; color: #666;"></div>
    </div>

    <div id="errorContainer"></div>

    <div class="layout">
      <!-- Left: Original PDF Image -->
      <div class="panel">
        <div class="panel-header">📄 Original PDF Page</div>
        <div class="panel-content">
          <div class="image-container">
            <img id="pageImage" src="" alt="PDF page">
            <div class="image-nav">
              <button id="prevBtn" onclick="showPreviousImage()">← Previous</button>
              <span id="imageCounter" style="padding: 8px 16px; color: #666;">-/-</span>
              <button id="nextBtn" onclick="showNextImage()">Next →</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Qwen Output JSON Editor -->
      <div class="panel">
        <div class="panel-header">📝 Qwen Extraction (Edit & Save)</div>
        <div class="panel-content">
          <div class="json-editor">
            <textarea id="jsonEditor" placeholder="JSON will load here..."></textarea>
          </div>
          <div class="actions">
            <button class="success" onclick="saveAnnotation()">💾 Save Annotation</button>
            <button onclick="resetJSON()">🔄 Reset</button>
            <button onclick="validateJSON()">✓ Validate JSON</button>
          </div>
          <div id="validationResult" style="margin-top: 10px;"></div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top: 20px;">
      <div class="panel-header">📋 Review Notes</div>
      <div class="panel-content">
        <textarea id="reviewNotes" placeholder="Add any notes about this extraction (issues found, corrections made, confidence level, etc.)" style="width: 100%; min-height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;"></textarea>
        <div class="actions">
          <button class="success" onclick="markAsReviewed()">✓ Mark as Reviewed</button>
          <button class="danger" onclick="markForRedo()">⚠️ Mark for Redo</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentRecord = null;
    let currentImages = [];
    let currentImageIndex = 0;
    let originalJSON = null;

    // Load manifest on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await loadRecords();
    });

    async function loadRecords() {
      try {
        // Note: In browser, this won't work directly. You need to:
        // 1. Run python pdf-processor.py in terminal (processes PDFs)
        // 2. Run node qwen-processor.js in terminal (calls Qwen)
        // 3. Then open this file in a local server

        // For now, show instructions
        document.getElementById('errorContainer').innerHTML = `
          <div class="info">
            <strong>⚠️ Setup Instructions:</strong>
            <ol style="margin-top: 10px; padding-left: 20px;">
              <li>Upload PDF files to: <code>training-data/raw/</code></li>
              <li>Run: <code>python training-data/pdf-processor.py</code></li>
              <li>Run: <code>node training-data/qwen-processor.js</code></li>
              <li>Refresh this page to load records</li>
            </ol>
          </div>
        `;

        // In a real setup, you'd:
        // const response = await fetch('../manifest.json');
        // const manifest = await response.json();
        // populateRecordSelector(manifest.datasets);
      } catch (error) {
        showError(`Error loading records: ${error.message}`);
      }
    }

    function populateRecordSelector(records) {
      const select = document.getElementById('recordSelect');
      select.innerHTML = '<option value="">Select a record...</option>';

      for (const record of records) {
        if (record.qwen_output) {
          const option = document.createElement('option');
          option.value = record.id;
          option.textContent = `${record.id} — ${record.source_file}`;
          select.appendChild(option);
        }
      }

      if (records.length === 0) {
        showError('No Qwen extractions found. Run pdf-processor.py and qwen-processor.js first.');
      }
    }

    async function loadRecord(recordId) {
      if (!recordId) return;

      try {
        // Load metadata
        const metadataResponse = await fetch(`../processing/${recordId}/metadata.json`);
        const metadata = await metadataResponse.json();

        // Load Qwen output
        const qwenResponse = await fetch(`../qwen-output/${recordId}-qwen.json`);
        const qwenData = await qwenResponse.json();

        currentRecord = { id: recordId, ...metadata };
        originalJSON = JSON.parse(JSON.stringify(qwenData)); // Deep copy

        // Extract image paths
        const rasterizeStep = metadata.processing_steps?.find(s => s.step === 'rasterize');
        currentImages = rasterizeStep?.images || [];
        currentImageIndex = 0;

        // Populate UI
        document.getElementById('recordInfo').innerHTML = `
          <strong>${metadata.source_file}</strong><br>
          Content: ${metadata.content_analysis.content_type} | Pages: ${metadata.content_analysis.page_count}
        `;

        document.getElementById('jsonEditor').value = JSON.stringify(qwenData, null, 2);
        document.getElementById('reviewNotes').value = metadata.annotations?.notes || '';

        showImage(0);

        // Clear error
        document.getElementById('errorContainer').innerHTML = '';
      } catch (error) {
        showError(`Error loading record: ${error.message}`);
      }
    }

    function showImage(index) {
      if (currentImages.length === 0) return;

      currentImageIndex = Math.max(0, Math.min(index, currentImages.length - 1));
      const imagePath = currentImages[currentImageIndex];

      document.getElementById('pageImage').src = imagePath;
      document.getElementById('imageCounter').textContent = `${currentImageIndex + 1}/${currentImages.length}`;
      document.getElementById('prevBtn').disabled = currentImageIndex === 0;
      document.getElementById('nextBtn').disabled = currentImageIndex === currentImages.length - 1;
    }

    function showPreviousImage() {
      showImage(currentImageIndex - 1);
    }

    function showNextImage() {
      showImage(currentImageIndex + 1);
    }

    function validateJSON() {
      try {
        const json = JSON.parse(document.getElementById('jsonEditor').value);
        document.getElementById('validationResult').innerHTML = '<div class="success">✓ Valid JSON</div>';
      } catch (error) {
        document.getElementById('validationResult').innerHTML = `<div class="error">✗ Invalid JSON: ${error.message}</div>`;
      }
    }

    function resetJSON() {
      document.getElementById('jsonEditor').value = JSON.stringify(originalJSON, null, 2);
      document.getElementById('validationResult').innerHTML = '';
    }

    async function saveAnnotation() {
      if (!currentRecord) {
        showError('No record selected');
        return;
      }

      try {
        validateJSON();
        const jsonText = document.getElementById('validationResult').textContent;
        if (!jsonText.includes('Valid JSON')) {
          showError('Fix JSON errors before saving');
          return;
        }

        const annotatedData = {
          record_id: currentRecord.id,
          source_file: currentRecord.source_file,
          annotation_date: new Date().toISOString(),
          qwen_extraction: JSON.parse(document.getElementById('jsonEditor').value),
          review_notes: document.getElementById('reviewNotes').value,
          status: 'annotated'
        };

        // Save as JSON file (you'd need backend API for this)
        // For now, show success and data
        const blob = new Blob([JSON.stringify(annotatedData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentRecord.id}-annotated.json`;
        a.click();

        showSuccess(`Annotation saved! File: ${currentRecord.id}-annotated.json\nMove to: training-data/annotated/`);
      } catch (error) {
        showError(`Error saving annotation: ${error.message}`);
      }
    }

    function markAsReviewed() {
      saveAnnotation();
    }

    function markForRedo() {
      if (confirm('Mark this record for re-extraction?')) {
        showError('Marked for redo. Contact admin to reprocess.');
      }
    }

    function showError(msg) {
      document.getElementById('errorContainer').innerHTML = `<div class="error">${msg}</div>`;
    }

    function showSuccess(msg) {
      document.getElementById('errorContainer').innerHTML = `<div class="success">${msg}</div>`;
    }

    // Hook record selector
    document.getElementById('recordSelect').addEventListener('change', (e) => {
      loadRecord(e.target.value);
    });
  </script>
</body>
</html>
